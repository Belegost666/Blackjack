<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLACKJUICE - TOKEN EDITION</title>
    <style>
        :root {
            --gold: #d4af37; --dark-gold: #aa8a2e; --felt-green: #064d26; --deep-green: #032b15;
            --card-red: #d40000;
        }
        body { font-family: 'Times New Roman', serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        .table-surface { 
            max-width: 500px; margin: auto; border: 4px solid var(--dark-gold); border-radius: 20px; 
            background: radial-gradient(circle, var(--felt-green) 0%, var(--deep-green) 100%); 
            padding: 15px; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); min-height: 85vh;
        }
        .stats-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--gold); }
        .stat-label { font-size: 0.7rem; display: block; color: #ccc; }
        
        .card-area { min-height: 100px; margin: 15px 0; }
        .cards-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .card { 
            background: #fff; width: 45px; height: 65px; border-radius: 5px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-weight: bold; color: #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .card.red { color: var(--card-red); }

        .controls { margin-top: 20px; }
        .btn { padding: 15px 25px; font-size: 1rem; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; margin: 5px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        
        .token { 
            display: inline-block; width: 40px; height: 40px; background: radial-gradient(circle, #f9d976, #b28a15);
            border-radius: 50%; border: 2px dashed #fff; margin: 5px; cursor: pointer;
            box-shadow: 0 4px 0 #86650a; transition: 0.2s;
        }
        .token:active { transform: translateY(4px); box-shadow: none; }
        
        .log-box { font-size: 0.9rem; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; margin-top: 15px; min-height: 40px; }
        #timer { font-size: 3.5rem; color: var(--gold); margin: 20px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="table-surface">
    <h1>BLACKJUICE</h1>

    <div id="setup">
        <p>CHOISIS TA SESSION</p>
        <button class="btn btn-gold" onclick="startSession(2, 3)">2 MIN (3 mains)</button><br>
        <button class="btn btn-gold" onclick="startSession(5, 5)">5 MIN (5 mains)</button><br>
        <button class="btn btn-gold" onclick="startSession(10, 9)">10 MIN (9 mains)</button>
    </div>

    <div id="game" class="hidden">
        <div class="stats-bar">
            <div><span class="stat-label">TEMPS</span><span id="total-time" class="stat-val">0</span><span class="stat-val"> min</span></div>
            <div><span class="stat-label">MAIN</span><span id="hand-count" class="stat-val">1/3</span></div>
            <div><span class="stat-label">JETONS</span><span id="token-count" class="stat-val">0</span></div>
        </div>

        <div class="bank-area">
            <div class="stat-label">BANQUE</div>
            <div id="bank-cards" class="cards-row"></div>
            <div id="bank-score" style="font-size: 0.8rem;">Score: ?</div>
        </div>

        <div class="player-area" style="margin-top: 30px; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 20px;">
            <div class="stat-label">TES CARTES</div>
            <div id="player-cards" class="cards-row"></div>
            <div id="player-score" class="stat-val">0</div>
        </div>

        <div id="actions" class="controls">
            <button class="btn btn-gold" onclick="hit()">TIRE</button>
            <button class="btn btn-outline" onclick="stay()">RESTE</button>
        </div>

        <div id="log" class="log-box">Bonne chance...</div>
    </div>

    <div id="token-phase" class="hidden">
        <h3>TIRAGE DES JETONS</h3>
        <p id="token-instruction">Clique sur un jeton pour tenter ta chance</p>
        <div id="tokens-container"></div>
        <div id="draw-log" class="log-box"></div>
        <button id="final-btn" class="btn btn-gold hidden" onclick="startSentence()">VOIR MA SENTENCE</button>
    </div>

    <div id="sentence" class="hidden">
        <p id="final-text"></p>
        <div id="timer">0:00</div>
        <button class="btn btn-outline" onclick="location.reload()">REJOUER</button>
    </div>
</div>

<script>
    let totalTime = 0, currentHand = 1, totalHands = 0, tokens = 0;
    let deck = [], playerHand = [], bankHand = [], hasDoubled = false;

    function startSession(min, hands) {
        totalTime = min; totalHands = hands;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        updateStats();
        initHand();
    }

    function initHand() {
        deck = createDeck();
        playerHand = [deck.pop(), deck.pop()];
        bankHand = [deck.pop(), deck.pop()];
        renderCards();
        document.getElementById('actions').classList.remove('hidden');
        document.getElementById('log').innerText = "Main " + currentHand + " en cours...";
    }

    function createDeck() {
        const suits = [{s:'♥',c:'red'},{s:'♦',c:'red'},{s:'♣',c:'black'},{s:'♠',c:'black'}];
        const values = [2,3,4,5,6,7,8,9,10,10,10,11];
        let d = [];
        for(let i=0; i<4; i++) suits.forEach(s => values.forEach(v => d.push({v, s:s.s, c:s.c})));
        return d.sort(() => Math.random() - 0.5);
    }

    function getScore(hand) {
        let score = hand.reduce((s, c) => s + c.v, 0);
        let aces = hand.filter(c => c.v === 11).length;
        while (score > 21 && aces > 0) { score -= 10; aces--; }
        return score;
    }

    function renderCards(showBank = false) {
        document.getElementById('player-cards').innerHTML = playerHand.map(c => `<div class="card ${c.c}">${c.v === 11 ? 'A' : c.v} ${c.s}</div>`).join('');
        document.getElementById('player-score').innerText = getScore(playerHand);
        
        if(showBank) {
            document.getElementById('bank-cards').innerHTML = bankHand.map(c => `<div class="card ${c.c}">${c.v === 11 ? 'A' : c.v} ${c.s}</div>`).join('');
            document.getElementById('bank-score').innerText = "Score: " + getScore(bankHand);
        } else {
            document.getElementById('bank-cards').innerHTML = `<div class="card" style="background:var(--dark-gold)">?</div>` + `<div class="card ${bankHand[1].c}">${bankHand[1].v === 11 ? 'A' : bankHand[1].v} ${bankHand[1].s}</div>`;
            document.getElementById('bank-score').innerText = "Score: ?";
        }
    }

    function hit() {
        playerHand.push(deck.pop());
        renderCards();
        if(getScore(playerHand) >= 21) stay();
    }

    function stay() {
        document.getElementById('actions').classList.add('hidden');
        while(getScore(bankHand) < 17) bankHand.push(deck.pop());
        renderCards(true);
        calculateHand();
    }

    function calculateHand() {
        const p = getScore(playerHand);
        const b = getScore(bankHand);
        let diff = 0;
        let log = "";

        if (p > 21) {
            log = "BURST ! Malus double.";
            diff = (p - 21) * 2;
        } else if (b > 21) {
            log = "BANQUE BURST !";
            diff = -((b - 21) * 2);
        } else if (p === 21) {
            if (b === 21) {
                log = "DOUBLE 21 ! Jeton annulé +2min.";
                diff = 2;
            } else {
                log = "BLACKJACK ! +1 Jeton.";
                tokens++;
                diff = b - 21;
            }
        } else if (b === 21) {
            log = "BANQUE 21 ! Malus x2.";
            diff = (21 - p) * 2;
        } else {
            log = p < b ? "Perdu..." : "Gagné !";
            diff = b - p;
        }

        totalTime += diff;
        if(totalTime < 1) totalTime = 1;
        updateStats();
        document.getElementById('log').innerHTML = `<strong>${log}</strong> (${diff >= 0 ? '+' : ''}${diff} min)`;

        setTimeout(() => {
            if(currentHand < totalHands) {
                currentHand++;
                initHand();
            } else {
                finishGame();
            }
        }, 2500);
    }

    function updateStats() {
        document.getElementById('total-time').innerText = Math.round(totalTime);
        document.getElementById('hand-count').innerText = `${currentHand}/${totalHands}`;
        document.getElementById('token-count').innerText = tokens;
    }

    function finishGame() {
        document.getElementById('game').classList.add('hidden');
        if(tokens > 0) {
            document.getElementById('token-phase').classList.remove('hidden');
            renderTokens();
        } else {
            startSentence();
        }
    }

    function renderTokens() {
        const container = document.getElementById('tokens-container');
        container.innerHTML = "";
        for(let i=0; i<tokens; i++) {
            container.innerHTML += `<div class="token" id="t-${i}" onclick="useToken(${i})"></div>`;
        }
    }

    function useToken(id) {
        const tokenElem = document.getElementById(`t-${id}`);
        if(!tokenElem || tokenElem.style.opacity === "0.3") return;
        
        tokenElem.style.opacity = "0.3";
        tokenElem.style.pointerEvents = "none";

        let rand = Math.random();
        let log = document.getElementById('draw-log');

        if(rand < 0.1) { // 10% Gagner le droit de jouir
            log.innerHTML = "<h3 style='color:#0f0'>DROIT DE JOUIR OBTENU !</h3>";
            tokens = 0; // Annule les autres
            document.getElementById('tokens-container').innerHTML = "";
            showFinalBtn(true);
        } else if (!hasDoubled && rand < 0.4) { // 30% Double temps
            hasDoubled = true;
            totalTime *= 2;
            log.innerHTML = "<h3 style='color:#f00'>TEMPS DOUBLÉ !</h3>";
            updateStats();
        } else { // 60% Rien
            log.innerHTML = "Rien du tout...";
        }

        let remaining = Array.from(document.querySelectorAll('.token')).filter(t => t.style.opacity !== "0.3");
        if(remaining.length === 0 || tokens === 0) showFinalBtn(tokens === 0);
    }

    function showFinalBtn(isWinner) {
        const btn = document.getElementById('final-btn');
        btn.classList.remove('hidden');
        btn.setAttribute('data-win', isWinner);
    }

    function startSentence() {
        document.getElementById('token-phase').classList.add('hidden');
        document.getElementById('game').classList.add('hidden');
        document.getElementById('sentence').classList.remove('hidden');
        
        const isWinner = document.getElementById('final-btn').getAttribute('data-win') === "true";
        const textElem = document.getElementById('final-text');
        
        if(isWinner) {
            textElem.innerHTML = `Bravo ! Tu as <span style="color:var(--gold)">${totalTime} minutes</span> pour jouir. Si tu échoues, tu dois rejouer.`;
        } else {
            textElem.innerHTML = `Tu as perdu ! Masturbation sans jouir pendant <span style="color:var(--gold)">${totalTime} minutes</span>.`;
        }

        let left = totalTime * 60;
        const tElem = document.getElementById('timer');
        let countdown = setInterval(() => {
            let m = Math.floor(left/60), s = left%60;
            tElem.innerText = `${m}:${s<10?'0':''}${s}`;
            if(left-- <= 0) { clearInterval(countdown); tElem.innerText = "FINI"; }
        }, 1000);
    }
</script>
</body>
</html>
